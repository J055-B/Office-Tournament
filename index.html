<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Callisto Mundial — The Sales Tournament Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#E0A934;
    --gold-bright:#F5C95A;
    --gold-dark:#8B6914;
    --red:#C0392B;
    --bg:#1a0f0a;
    --bg2:#2a160d;
    --text:#f3e9d8;
    --text-dim:#a89880;
    --font-d:'Bebas Neue','Impact',sans-serif;
    --font-b:'Inter',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:var(--font-b);
    background:radial-gradient(ellipse at 50% 30%, #3a1f10 0%, var(--bg2) 45%, var(--bg) 100%);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }

  /* ── ambient stadium glow + rays ── */
  .rays{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      conic-gradient(from 0deg at 50% 38%,
        rgba(224,169,52,0.00) 0deg,
        rgba(224,169,52,0.05) 12deg,
        rgba(224,169,52,0.00) 24deg,
        rgba(192,57,43,0.04) 36deg,
        rgba(224,169,52,0.00) 48deg);
    animation:spin 80s linear infinite;
    opacity:0.7;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .vignette{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
  }

  /* floating embers */
  .ember{
    position:fixed;bottom:-10px;width:3px;height:3px;border-radius:50%;
    background:var(--gold-bright);opacity:0;z-index:1;
    animation:rise linear infinite;
  }
  @keyframes rise{
    0%{transform:translateY(0) scale(1);opacity:0;}
    10%{opacity:0.7;}
    90%{opacity:0.3;}
    100%{transform:translateY(-100vh) scale(0.3);opacity:0;}
  }

  /* ── main stage ── */
  .stage{
    position:relative;z-index:5;
    text-align:center;
    padding:32px 24px;
    max-width:640px;
    animation:fadeUp 1.1s cubic-bezier(.16,1,.3,1);
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}

  /* ── LOGO ── */
  .logo-wrap{
    margin-bottom:6px;
    position:relative;
    display:inline-block;
  }
  .logo-wrap::after{
    content:'';
    position:absolute;inset:-8% -8%;
    background:radial-gradient(circle, rgba(224,169,52,0.22) 0%, transparent 65%);
    z-index:-1;
    animation:pulse 4s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.6;transform:scale(1);}50%{opacity:1;transform:scale(1.06);}}

  .logo{
    width:300px;max-width:72vw;height:auto;
    filter:drop-shadow(0 12px 40px rgba(0,0,0,0.6));
  }
  /* fallback crest if no image yet */
  .logo-fallback{
    width:280px;max-width:70vw;height:280px;
    border-radius:50%;
    border:4px solid var(--gold);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 35%, #3a2010, #1a0f0a);
    box-shadow:0 12px 50px rgba(0,0,0,0.6), inset 0 0 60px rgba(224,169,52,0.1);
    margin:0 auto;
  }
  .logo-fallback .cup{font-size:64px;line-height:1;margin-bottom:8px;}
  .logo-fallback .fb-name{font-family:var(--font-d);font-size:44px;letter-spacing:4px;color:var(--gold-bright);line-height:.9;}
  .logo-fallback .fb-sub{font-family:var(--font-d);font-size:22px;letter-spacing:8px;color:var(--text-dim);}

  /* ── TITLES ── */
  .title{
    font-family:var(--font-d);
    font-size:clamp(56px,11vw,108px);
    letter-spacing:6px;
    line-height:.92;
    background:linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 50%, var(--gold-dark) 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 4px 30px rgba(224,169,52,0.25);
    margin-bottom:2px;
  }
  .tagline{
    font-family:var(--font-d);
    font-size:clamp(18px,3.4vw,30px);
    letter-spacing:7px;
    color:var(--text);
    text-transform:uppercase;
    margin-bottom:4px;
  }
  .subtagline{
    font-size:12px;
    letter-spacing:5px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:38px;
  }
  .divider{
    width:80px;height:2px;margin:0 auto 34px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
  }

  /* ── ENTER BUTTON ── */
  .enter-btn{
    font-family:var(--font-d);
    font-size:24px;
    letter-spacing:5px;
    color:#1a0f0a;
    background:linear-gradient(180deg,var(--gold-bright),var(--gold));
    border:none;
    padding:16px 64px;
    border-radius:8px;
    cursor:pointer;
    text-transform:uppercase;
    transition:transform .18s ease, box-shadow .18s ease;
    box-shadow:0 6px 24px rgba(224,169,52,0.35);
  }
  .enter-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 10px 34px rgba(224,169,52,0.5);}
  .enter-btn:active{transform:translateY(0) scale(.99);}

  /* ── ADMIN CIRCLE BUTTON ── */
  .admin-zone{
    margin-top:36px;
    display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .admin-circle{
    width:54px;height:54px;
    border-radius:50%;
    background:rgba(255,255,255,0.04);
    border:1.5px solid rgba(224,169,52,0.4);
    color:var(--gold);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:all .2s ease;
  }
  .admin-circle:hover{
    background:rgba(224,169,52,0.12);
    border-color:var(--gold);
    transform:scale(1.08);
    box-shadow:0 0 20px rgba(224,169,52,0.25);
  }
  .admin-circle svg{width:22px;height:22px;}
  .admin-label{
    font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);
  }

  /* ── MODAL ── */
  .overlay{
    position:fixed;inset:0;z-index:50;
    background:rgba(10,6,3,0.82);
    backdrop-filter:blur(6px);
    display:none;
    align-items:center;justify-content:center;
    padding:24px;
    animation:fadeIn .25s ease;
  }
  .overlay.show{display:flex;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

  .modal{
    width:100%;max-width:380px;
    background:linear-gradient(180deg,#241308,#1a0f0a);
    border:1px solid rgba(224,169,52,0.3);
    border-radius:16px;
    padding:34px 30px;
    box-shadow:0 24px 80px rgba(0,0,0,0.7);
    animation:popIn .3s cubic-bezier(.16,1,.3,1);
  }
  @keyframes popIn{from{opacity:0;transform:scale(.92) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}

  .modal-icon{
    width:52px;height:52px;border-radius:50%;
    background:rgba(224,169,52,0.12);
    border:1px solid rgba(224,169,52,0.3);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 16px;color:var(--gold);
  }
  .modal-icon svg{width:24px;height:24px;}
  .modal-title{
    font-family:var(--font-d);font-size:26px;letter-spacing:3px;
    text-align:center;color:var(--gold-bright);margin-bottom:4px;
  }
  .modal-sub{
    font-size:11px;letter-spacing:2px;text-transform:uppercase;
    text-align:center;color:var(--text-dim);margin-bottom:24px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;
    color:var(--text-dim);margin-bottom:6px;
  }
  .field input{
    width:100%;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(224,169,52,0.2);
    border-radius:8px;
    padding:12px 14px;
    color:var(--text);
    font-size:15px;font-family:var(--font-b);
    transition:border-color .18s;
  }
  .field input:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,0.07);}

  .modal-error{
    font-size:12px;color:#e57373;text-align:center;
    min-height:18px;margin:2px 0 8px;letter-spacing:.5px;
  }
  .modal-btns{display:flex;gap:10px;margin-top:8px;}
  .btn-login{
    flex:1;
    font-family:var(--font-d);font-size:18px;letter-spacing:3px;
    color:#1a0f0a;background:linear-gradient(180deg,var(--gold-bright),var(--gold));
    border:none;border-radius:8px;padding:12px;cursor:pointer;
    text-transform:uppercase;transition:transform .15s, box-shadow .15s;
  }
  .btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(224,169,52,0.4);}
  .btn-cancel{
    font-family:var(--font-b);font-size:13px;font-weight:600;letter-spacing:1px;
    color:var(--text-dim);background:transparent;
    border:1px solid rgba(255,255,255,0.1);border-radius:8px;
    padding:12px 18px;cursor:pointer;transition:all .15s;
  }
  .btn-cancel:hover{color:var(--text);border-color:rgba(255,255,255,0.25);}

  /* footer credit */
  .footer-credit{
    position:fixed;bottom:14px;left:0;right:0;z-index:5;
    text-align:center;font-size:10px;letter-spacing:3px;
    text-transform:uppercase;color:rgba(168,152,128,0.5);
  }
</style>
</head>
<body>

  <div class="rays"></div>
  <div class="vignette"></div>

  <!-- MAIN STAGE -->
  <div class="stage">
    <div class="logo-wrap">
      <img src="assets/callisto.png" alt="Callisto Mundial" class="logo"
           onerror="this.style.display='none';document.getElementById('logoFallback').style.display='flex';">
      <!-- Fallback por si la imagen no carga (queda oculto si callisto.png existe) -->
      <div class="logo-fallback" id="logoFallback" style="display:none;">
        <div class="cup">🏆</div>
        <div class="fb-name">CALLISTO</div>
        <div class="fb-sub">MUNDIAL</div>
      </div>
    </div>

    <h1 class="tagline" style="margin-top:14px;">The Sales Tournament Challenge</h1>
    <div class="subtagline">Where champions are made</div>
    <div class="divider"></div>

    <button class="enter-btn" onclick="enterAsVisitor()">Ingresar</button>

    <!-- ADMIN CIRCLE -->
    <div class="admin-zone">
      <button class="admin-circle" onclick="openAdmin()" aria-label="Acceso administrador">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </button>
      <span class="admin-label">Admin</span>
    </div>
  </div>

  <!-- ADMIN LOGIN MODAL -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="modal-title">Acceso Admin</div>
      <div class="modal-sub">Ingresá para editar el torneo</div>

      <div class="field">
        <label for="user">Usuario</label>
        <input type="text" id="user" autocomplete="username" placeholder="Joss" onkeydown="if(event.key==='Enter')document.getElementById('pass').focus()">
      </div>
      <div class="field">
        <label for="pass">Contraseña</label>
        <input type="password" id="pass" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()">
      </div>

      <div class="modal-error" id="error"></div>

      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeAdmin()">Cancelar</button>
        <button class="btn-login" onclick="tryLogin()">Entrar</button>
      </div>
    </div>
  </div>

  <div class="footer-credit">Callisto · The Internet Planet · Season 2025</div>

  <script>
    /* ── Credenciales admin (luego se pueden mover a config) ── */
    const ADMINS = {
      "joss": { pass: "35618728", name: "Joss", avatar: "blackhole" }
      /* Para sumar más admins, agregalos acá:
         "adri": { pass: "35618728", name: "Adri", avatar: "star" }
      */
    };

    function enterAsVisitor(){
      sessionStorage.setItem('role', 'visitor');
      /* Cuando el panel esté listo: window.location.href = 'panel.html'; */
      window.location.href = 'panel.html';
    }

    function openAdmin(){
      document.getElementById('overlay').classList.add('show');
      document.getElementById('error').textContent = '';
      setTimeout(()=>document.getElementById('user').focus(), 80);
    }
    function closeAdmin(){
      document.getElementById('overlay').classList.remove('show');
      document.getElementById('user').value='';
      document.getElementById('pass').value='';
      document.getElementById('error').textContent='';
    }
    function tryLogin(){
      const u = document.getElementById('user').value.trim().toLowerCase();
      const p = document.getElementById('pass').value;
      const err = document.getElementById('error');
      if(ADMINS[u] && ADMINS[u].pass === p){
        sessionStorage.setItem('role', 'admin');
        sessionStorage.setItem('adminName', ADMINS[u].name);
        window.location.href = 'panel.html';
      } else {
        err.textContent = 'Usuario o contraseña incorrectos';
        document.getElementById('pass').value='';
        document.getElementById('pass').focus();
      }
    }
    /* cerrar con clic fuera o Escape */
    document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeAdmin(); });
    document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeAdmin(); });

    /* ── embers ── */
    (function(){
      const n = 18;
      for(let i=0;i<n;i++){
        const e=document.createElement('div');
        e.className='ember';
        e.style.left=Math.random()*100+'vw';
        e.style.animationDuration=(6+Math.random()*8)+'s';
        e.style.animationDelay=(Math.random()*8)+'s';
        e.style.width=e.style.height=(2+Math.random()*3)+'px';
        document.body.appendChild(e);
      }
    })();
  </script>
</body>
</html>
