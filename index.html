<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Callisto Mundial — The Sales Tournament Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#1a7a3c;
    --green-light:#25a852;
    --gold:#f5c518;
    --gold-dark:#c9a000;
    --red:#c0392b;
    --white:#f9f9f4;
    --dark:#0d1f14;
    --gray:#2e3d2f;
    --card-bg:rgba(255,255,255,0.04);
    --card-border:rgba(255,255,255,0.08);
    --font-d:'Bebas Neue','Impact',sans-serif;
    --font-b:'Inter',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:var(--font-b);
    background:var(--dark);
    background-image:
      radial-gradient(ellipse at 50% 30%,rgba(26,122,60,.35) 0%,transparent 50%),
      radial-gradient(ellipse at 90% 80%,rgba(37,168,82,.15) 0%,transparent 50%),
      repeating-linear-gradient(45deg,transparent,transparent 60px,rgba(255,255,255,.015) 60px,rgba(255,255,255,.015) 61px);
    color:var(--white);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;position:relative;
  }
  .rays{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:conic-gradient(from 0deg at 50% 38%,
      rgba(37,168,82,0.00) 0deg, rgba(37,168,82,0.06) 12deg, rgba(37,168,82,0.00) 24deg,
      rgba(245,197,24,0.04) 36deg, rgba(37,168,82,0.00) 48deg);
    animation:spin 80s linear infinite;opacity:.6;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.55) 100%);}
  .ember{position:fixed;bottom:-10px;width:3px;height:3px;border-radius:50%;
    background:var(--gold);opacity:0;z-index:1;animation:rise linear infinite;}
  @keyframes rise{
    0%{transform:translateY(0) scale(1);opacity:0;}
    10%{opacity:.7;}90%{opacity:.3;}
    100%{transform:translateY(-100vh) scale(.3);opacity:0;}}
  .stage{position:relative;z-index:5;text-align:center;padding:32px 24px;max-width:640px;
    animation:fadeUp 1.1s cubic-bezier(.16,1,.3,1);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
  .logo-wrap{margin-bottom:6px;position:relative;display:inline-block;}
  .logo-wrap::after{content:'';position:absolute;inset:-8% -8%;
    background:radial-gradient(circle,rgba(37,168,82,0.25) 0%,transparent 65%);
    z-index:-1;animation:pulse 4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.6;transform:scale(1);}50%{opacity:1;transform:scale(1.06);}}
  .logo{width:300px;max-width:72vw;height:auto;filter:drop-shadow(0 12px 40px rgba(0,0,0,.6));}
  .logo-fallback{width:280px;max-width:70vw;height:280px;border-radius:50%;
    border:4px solid var(--gold);display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 35%,var(--gray),var(--dark));
    box-shadow:0 12px 50px rgba(0,0,0,.6),inset 0 0 60px rgba(37,168,82,0.1);margin:0 auto;}
  .logo-fallback .cup{font-size:64px;line-height:1;margin-bottom:8px;}
  .logo-fallback .fb-name{font-family:var(--font-d);font-size:44px;letter-spacing:4px;color:var(--gold);line-height:.9;}
  .logo-fallback .fb-sub{font-family:var(--font-d);font-size:22px;letter-spacing:8px;color:var(--green-light);}
  .tagline{font-family:var(--font-d);font-size:clamp(18px,3.4vw,30px);letter-spacing:7px;
    color:var(--green-light);text-transform:uppercase;margin-bottom:4px;}
  .subtagline{font-size:12px;letter-spacing:5px;text-transform:uppercase;
    color:rgba(255,255,255,.45);margin-bottom:38px;}
  .divider{width:80px;height:2px;margin:0 auto 34px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .enter-btn{font-family:var(--font-d);font-size:24px;letter-spacing:5px;color:#000;
    background:var(--gold);border:none;padding:16px 64px;border-radius:10px;cursor:pointer;
    text-transform:uppercase;transition:transform .18s ease,box-shadow .18s ease,background .2s;
    box-shadow:0 6px 24px rgba(245,197,24,.35);}
  .enter-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 10px 34px rgba(245,197,24,.5);background:var(--gold-dark);}
  .enter-btn:active{transform:translateY(0) scale(.99);}
  .admin-zone{margin-top:36px;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .admin-circle{width:54px;height:54px;border-radius:50%;background:var(--card-bg);
    border:1.5px solid rgba(245,197,24,.4);color:var(--gold);
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s ease;}
  .admin-circle:hover{background:rgba(245,197,24,.12);border-color:var(--gold);
    transform:scale(1.08);box-shadow:0 0 20px rgba(245,197,24,.3);}
  .admin-circle svg{width:22px;height:22px;}
  .admin-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4);}
  .overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.75);
    backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:24px;}
  .overlay.show{display:flex;}
  .modal{width:100%;max-width:380px;background:var(--gray);border:1px solid rgba(245,197,24,.3);
    border-radius:16px;padding:34px 30px;box-shadow:0 24px 80px rgba(0,0,0,.7);
    animation:popIn .3s cubic-bezier(.16,1,.3,1);}
  @keyframes popIn{from{opacity:0;transform:scale(.92) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
  .modal-icon{width:52px;height:52px;border-radius:50%;background:rgba(245,197,24,.12);
    border:1px solid rgba(245,197,24,.3);display:flex;align-items:center;justify-content:center;
    margin:0 auto 16px;color:var(--gold);}
  .modal-icon svg{width:24px;height:24px;}
  .modal-title{font-family:var(--font-d);font-size:26px;letter-spacing:3px;text-align:center;color:var(--gold);margin-bottom:4px;}
  .modal-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;text-align:center;color:rgba(255,255,255,.5);margin-bottom:24px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px;}
  .field input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
    border-radius:8px;padding:12px 14px;color:var(--white);font-size:15px;font-family:var(--font-b);outline:none;}
  .field input:focus{border-color:var(--gold);background:rgba(255,255,255,.1);}
  .modal-error{font-size:12px;color:#ff6b6b;text-align:center;min-height:18px;margin:2px 0 8px;}
  .modal-btns{display:flex;gap:10px;margin-top:8px;}
  .btn-login{flex:1;font-family:var(--font-d);font-size:18px;letter-spacing:3px;color:#000;
    background:var(--gold);border:none;border-radius:8px;padding:12px;cursor:pointer;text-transform:uppercase;}
  .btn-login:hover{background:var(--gold-dark);}
  .btn-cancel{font-family:var(--font-b);font-size:13px;font-weight:600;color:rgba(255,255,255,.5);
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;
    padding:12px 18px;cursor:pointer;}
  .btn-cancel:hover{color:var(--white);background:rgba(255,255,255,.12);}
  .footer-credit{position:fixed;bottom:14px;left:0;right:0;z-index:5;text-align:center;
    font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.2);}
</style>
</head>
<body>
  <div class="rays"></div>
  <div class="vignette"></div>
  <div class="stage">
    <div class="logo-wrap">
      <div style="display:flex;align-items:center;justify-content:center;gap:0;">
        <img src="assets/flag-left.gif" alt="" style="width:120px;margin-right:-16px;margin-top:12px;" onerror="this.style.display='none'">
        <img src="assets/callisto.png" alt="Callisto Mundial" class="logo"
             onerror="this.style.display='none';document.getElementById('logoFallback').style.display='flex';">
        <img src="assets/flag-right.gif" alt="" style="width:120px;margin-left:-16px;margin-top:12px;" onerror="this.style.display='none'">
      </div>
      <div class="logo-fallback" id="logoFallback" style="display:none;">
        <div class="cup">🏆</div>
        <div class="fb-name">CALLISTO</div>
        <div class="fb-sub">MUNDIAL</div>
      </div>
    </div>
    <h1 class="tagline" style="margin-top:14px;">The Sales Tournament Challenge</h1>
    <div class="subtagline">Where champions are made</div>
    <div class="divider"></div>
    <button class="enter-btn" onclick="enterAsVisitor()">Ingresar</button>
    <div class="admin-zone">
      <button class="admin-circle" onclick="openAdmin()" aria-label="Acceso administrador">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </button>
      <span class="admin-label">Admin</span>
    </div>
  </div>
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="modal-title">🔐 Acceso Admin</div>
      <div class="modal-sub">Ingresá tus credenciales</div>
      <div class="field"><label for="user">Usuario</label>
        <input type="text" id="user" autocomplete="username" placeholder="Joss" onkeydown="if(event.key==='Enter')document.getElementById('pass').focus()"></div>
      <div class="field"><label for="pass">Contraseña</label>
        <input type="password" id="pass" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()"></div>
      <div class="modal-error" id="error"></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeAdmin()">Cancelar</button>
        <button class="btn-login" onclick="tryLogin()">Ingresar</button>
      </div>
    </div>
  </div>
  <div class="footer-credit">Callisto · The Internet Planet · Season 2025</div>
  <script>
    const ADMINS={"joss":{pass:"35618728",name:"Joss"}};
    function enterAsVisitor(){sessionStorage.setItem('role','visitor');window.location.href='panel.html';}
    function openAdmin(){document.getElementById('overlay').classList.add('show');document.getElementById('error').textContent='';setTimeout(()=>document.getElementById('user').focus(),80);}
    function closeAdmin(){document.getElementById('overlay').classList.remove('show');document.getElementById('user').value='';document.getElementById('pass').value='';document.getElementById('error').textContent='';}
    function tryLogin(){
      const u=document.getElementById('user').value.trim().toLowerCase(),p=document.getElementById('pass').value,err=document.getElementById('error');
      if(ADMINS[u]&&ADMINS[u].pass===p){sessionStorage.setItem('role','admin');sessionStorage.setItem('adminName',ADMINS[u].name);window.location.href='panel.html';}
      else{err.textContent='Usuario o contraseña incorrectos';document.getElementById('pass').value='';document.getElementById('pass').focus();}
    }
    document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeAdmin();});
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAdmin();});
    (function(){for(let i=0;i<18;i++){const e=document.createElement('div');e.className='ember';e.style.left=Math.random()*100+'vw';e.style.animationDuration=(6+Math.random()*8)+'s';e.style.animationDelay=(Math.random()*8)+'s';e.style.width=e.style.height=(2+Math.random()*3)+'px';document.body.appendChild(e);}})();
  </script>
</body>
</html>
